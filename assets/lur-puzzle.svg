<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="LUR Growth">
  <title>LUR Growth</title>
  <!--
    Four interlocking puzzle pieces.
    Brand palette:
      navy (top-left) · coral (top-right) · teal (bottom-left) · green (bottom-right)
    Grid divides at (32,32). Tabs and slots are cubic-bezier semicircles
    centered on each piece's interior edge; matching pairs fit exactly.
  -->

  <!-- Top-left · navy · tab right, tab down -->
  <path fill="#0f2337" d="
    M 3 0
    L 32 0
    L 32 10
    C 42 10, 42 22, 32 22
    L 32 32
    L 22 32
    C 22 42, 10 42, 10 32
    L 0 32
    L 0 3
    A 3 3 0 0 1 3 0
    Z"/>

  <!-- Top-right · coral · slot left (matches navy tab), tab down -->
  <path fill="#fd9d7d" d="
    M 32 0
    L 61 0
    A 3 3 0 0 1 64 3
    L 64 32
    L 54 32
    C 54 42, 42 42, 42 32
    L 32 32
    L 32 22
    C 42 22, 42 10, 32 10
    L 32 0
    Z"/>

  <!-- Bottom-left · teal · slot top (matches navy tab), tab right -->
  <path fill="#5bb9b0" d="
    M 0 32
    L 10 32
    C 10 42, 22 42, 22 32
    L 32 32
    L 32 42
    C 42 42, 42 54, 32 54
    L 32 64
    L 3 64
    A 3 3 0 0 1 0 61
    Z"/>

  <!-- Bottom-right · green · slot top (matches coral tab), slot left (matches teal tab) -->
  <path fill="#7fae6f" d="
    M 32 32
    L 42 32
    C 42 42, 54 42, 54 32
    L 64 32
    L 64 61
    A 3 3 0 0 1 61 64
    L 32 64
    L 32 54
    C 42 54, 42 42, 32 42
    L 32 32
    Z"/>
</svg>
